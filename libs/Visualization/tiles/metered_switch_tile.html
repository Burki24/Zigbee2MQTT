<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent: #10c8b2;
            --button-off: #607d8b;
            --bg: transparent;
            --text: #111111;
            --muted: #667085;
            --line: rgba(17, 24, 39, 0.12);
            --chip: rgba(0, 0, 0, 0.055);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent !important;
            background-color: transparent !important;
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button {
            font: inherit;
        }

        .tile {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 240px;
            overflow: hidden;
            background: transparent !important;
            background-color: transparent !important;
        }

        .view {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
            padding: 22px 18px 18px;
        }

        .view.active {
            display: block;
        }

        .power-view {
            background: transparent !important;
            background-color: transparent !important;
        }

        .nav-button {
            position: absolute;
            top: 76px;
            display: grid;
            place-items: center;
            width: 50px;
            height: 50px;
            border: 0;
            border-radius: 50%;
            color: var(--text);
            background: transparent;
            cursor: pointer;
            z-index: 3;
        }

        .nav-button:hover,
        .nav-button.active {
            background: var(--chip);
        }

        .nav-button.hidden {
            display: none;
        }

        .nav-button.left {
            left: 42px;
        }

        .nav-button.right {
            right: 42px;
        }

        .nav-icon {
            width: 27px;
            height: 27px;
        }

        .power-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            display: grid;
            justify-items: center;
            transform: translate(-50%, -50%);
        }

        .power-button {
            display: grid;
            place-items: center;
            width: min(34vw, 34vh, 148px);
            height: min(34vw, 34vh, 148px);
            min-width: 104px;
            min-height: 104px;
            border: 0;
            border-radius: 50%;
            color: #ffffff;
            background: var(--accent);
            cursor: pointer;
            transition: background 160ms ease, transform 160ms ease;
        }

        .power-button.off {
            background: var(--button-off);
        }

        .power-button:active {
            transform: scale(0.97);
        }

        .power-icon {
            width: 54%;
            height: 54%;
        }

        .power-wrap.hidden {
            display: none;
        }

        .switch-list {
            position: absolute;
            left: 28px;
            right: 126px;
            top: 64px;
            bottom: 16px;
            display: grid;
            align-content: center;
            gap: 9px;
            overflow: hidden;
        }

        .switch-list.hidden {
            display: none;
        }

        .power-view.no-values .switch-list {
            right: 28px;
        }

        .switch-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 42px;
            align-items: center;
            width: 100%;
            min-height: 42px;
            gap: 12px;
        }

        .switch-toggle {
            display: grid;
            place-items: center;
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 50%;
            color: #ffffff;
            background: var(--button-off);
            cursor: pointer;
            transition: background 160ms ease, transform 160ms ease;
        }

        .switch-toggle:hover {
            filter: brightness(1.05);
        }

        .switch-toggle:active {
            transform: scale(0.96);
        }

        .switch-toggle.on {
            background: var(--accent);
        }

        .switch-toggle svg {
            width: 25px;
            height: 25px;
        }

        .switch-state-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .list-view {
            background: transparent !important;
            background-color: transparent !important;
        }

        .channel-tabs {
            position: absolute;
            left: 22px;
            right: 84px;
            top: 82px;
            display: flex;
            gap: 6px;
            min-width: 0;
        }

        .channel-tabs.hidden {
            display: none;
        }

        .channel-button {
            min-width: 38px;
            height: 28px;
            padding: 0 12px;
            border: 0;
            border-radius: 7px;
            color: var(--accent);
            background: rgba(16, 200, 178, 0.12);
            cursor: pointer;
            font-size: 13px;
        }

        .channel-button.active {
            color: #ffffff;
            background: var(--accent);
        }

        .list {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 132px;
            bottom: 18px;
            display: grid;
            align-content: start;
            gap: 0;
            overflow: hidden;
        }

        .list.channel-filtered {
            top: 124px;
        }

        .row {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr) auto 32px;
            align-items: center;
            min-height: 36px;
            gap: 8px;
            border-bottom: 1px solid transparent;
            color: var(--text);
        }

        .row-icon {
            display: grid;
            place-items: center;
            color: var(--text);
        }

        .row-icon svg {
            width: 23px;
            height: 23px;
        }

        .row-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .row-value {
            overflow: hidden;
            max-width: 45vw;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .archive-button {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border: 0;
            border-radius: 50%;
            color: var(--text);
            background: transparent;
            cursor: pointer;
            opacity: 0.72;
        }

        .archive-button:hover {
            background: var(--chip);
            opacity: 1;
        }

        .archive-button.placeholder {
            visibility: hidden;
            pointer-events: none;
        }

        .archive-button svg {
            width: 20px;
            height: 20px;
        }

        .chart-view {
            background: transparent !important;
            background-color: transparent !important;
        }

        .chart-shell {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 92px;
            bottom: 18px;
            display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr);
            gap: 10px;
            min-height: 0;
        }

        .chart-title {
            overflow: hidden;
            color: var(--text);
            font-size: 17px;
            font-weight: 500;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chart-subtitle {
            color: var(--muted);
            font-size: 13px;
            min-height: 18px;
        }

        .range-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            overflow: hidden;
            width: min(230px, 100%);
            border-radius: 7px;
            background: rgba(16, 200, 178, 0.12);
        }

        .range-button {
            height: 30px;
            border: 0;
            color: var(--accent);
            background: transparent;
            cursor: pointer;
            font-size: 13px;
        }

        .range-button.active {
            color: #ffffff;
            background: var(--accent);
        }

        .chart-wrap {
            position: relative;
            min-height: 0;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            min-height: 120px;
            overflow: visible;
        }

        .chart-axis-label {
            fill: var(--muted);
            font-size: 9px;
            dominant-baseline: middle;
        }

        .chart-axis-label.right {
            text-anchor: end;
        }

        .chart-axis-label.center {
            text-anchor: middle;
        }

        .chart-empty {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            transform: translateY(-50%);
        }

        @media (max-width: 340px), (max-height: 300px) {
            .nav-button {
                top: 58px;
                width: 44px;
                height: 44px;
            }

            .nav-button.left {
                left: 24px;
            }

            .nav-button.right {
                right: 24px;
            }

            .list {
                top: 112px;
            }

            .switch-list {
                left: 18px;
                right: 104px;
                top: 56px;
                bottom: 12px;
                gap: 6px;
            }

            .power-view.no-values .switch-list {
                right: 18px;
            }

            .switch-row {
                min-height: 36px;
                grid-template-columns: minmax(0, 1fr) 36px;
            }

            .switch-toggle {
                width: 36px;
                height: 36px;
            }

            .switch-toggle svg {
                width: 22px;
                height: 22px;
            }

            .channel-tabs {
                left: 18px;
                right: 72px;
                top: 66px;
            }

            .list.channel-filtered {
                top: 104px;
            }

            .chart-shell {
                top: 82px;
                gap: 8px;
            }

            .row {
                min-height: 34px;
            }
        }
    </style>
</head>
<body>
    <main class="tile">
        <section class="view power-view active" id="powerView">
            <button class="nav-button right" id="showListRight" type="button" title="Messwerte">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 19h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M7 17V9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M12 17V5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M17 17v-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
            </button>

            <div class="power-wrap">
                <button class="power-button off" id="powerButton" type="button" aria-label="Toggle">
                    <svg class="power-icon" viewBox="0 0 64 64" aria-hidden="true">
                        <path d="M32 8v24" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"></path>
                        <path d="M21 18a21 21 0 1 0 22 0" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"></path>
                    </svg>
                </button>
            </div>
            <div class="switch-list hidden" id="switchList"></div>
        </section>

        <section class="view list-view" id="listView">
            <button class="nav-button right active" id="showPowerRight" type="button" title="Zurueck">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    <path d="M7.4 5.6a8 8 0 1 0 9.2 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </button>
            <div class="channel-tabs hidden" id="channelTabs"></div>
            <div class="list" id="meterList"></div>
        </section>

        <section class="view chart-view" id="chartView">
            <button class="nav-button right active" id="showListFromChart" type="button" title="Messwerte">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 6h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M8 12h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M8 18h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M3 6h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                    <path d="M3 12h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                    <path d="M3 18h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                </svg>
            </button>
            <div class="chart-shell">
                <div class="chart-title" id="chartTitle">Verlauf</div>
                <div class="chart-subtitle" id="chartSubtitle"></div>
                <div class="range-tabs">
                    <button class="range-button active" type="button" data-range="day">24 h</button>
                    <button class="range-button" type="button" data-range="week">7 d</button>
                    <button class="range-button" type="button" data-range="month">30 d</button>
                </div>
                <div class="chart-wrap">
                    <svg class="chart-svg" id="archiveChart" viewBox="0 0 320 150" preserveAspectRatio="none" aria-hidden="true"></svg>
                    <div class="chart-empty" id="chartEmpty"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const labels = {
            state: "Status",
            power: "Leistung",
            energy: "Energie",
            voltage: "Spannung",
            current: "Strom"
        };
        const metricOrder = ["energy", "power", "voltage", "current"];
        const rangeLabels = {
            day: "Letzte 24 Stunden",
            week: "Letzte 7 Tage",
            month: "Letzte 30 Tage"
        };
        const iconPaths = {
            power: '<path d="m13 2-7 12h6l-1 8 7-12h-6l1-8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>',
            energy: '<path d="m13 2-7 12h6l-1 8 7-12h-6l1-8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="M5 22h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            voltage: '<path d="M5 12h4l2-7 2 14 2-7h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>',
            current: '<path d="M4 14a8 8 0 1 1 16 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M12 14v-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M8 20h8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>'
        };

        let data = __INITIAL_DATA__;
        let activeView = "power";

        const powerView = document.getElementById("powerView");
        const listView = document.getElementById("listView");
        const chartView = document.getElementById("chartView");
        const powerWrap = document.querySelector(".power-wrap");
        const powerButton = document.getElementById("powerButton");
        const showListRight = document.getElementById("showListRight");
        const switchList = document.getElementById("switchList");
        const channelTabs = document.getElementById("channelTabs");
        const meterList = document.getElementById("meterList");
        const chartTitle = document.getElementById("chartTitle");
        const chartSubtitle = document.getElementById("chartSubtitle");
        const archiveChart = document.getElementById("archiveChart");
        const chartEmpty = document.getElementById("chartEmpty");
        const rangeButtons = Array.from(document.querySelectorAll(".range-button"));
        let activeArchiveIdent = null;
        let activeArchiveRange = "day";
        let primarySwitchIdent = "state";
        let activeChannelSuffix = null;

        function handleMessage(message) {
            const nextData = normalizeMessage(message);
            if (!nextData) {
                return;
            }

            const previousArchive = data.archive;
            data = nextData;
            if (!data.archive && previousArchive) {
                data.archive = previousArchive;
            }
            if (nextData.view === "archive" && nextData.archive) {
                activeView = "archive";
                activeArchiveIdent = nextData.archive.ident || activeArchiveIdent;
                activeArchiveRange = nextData.archive.range || activeArchiveRange;
            }
            render();
        }

        function normalizeMessage(message) {
            if (Array.isArray(message) && message.length === 1) {
                message = message[0];
            }

            if (typeof message === "string") {
                try {
                    message = JSON.parse(message);
                } catch {
                    return null;
                }
            }

            if (!message || typeof message !== "object") {
                return null;
            }

            if (message.type !== "meteredSwitch") {
                return null;
            }

            if (!message.values || typeof message.values !== "object") {
                message.values = {};
            }
            if (!message.switches || typeof message.switches !== "object") {
                message.switches = {};
            }
            if (Object.keys(message.switches).length === 0 && message.values.state) {
                message.switches = {
                    state: {
                        label: labels.state,
                        value: !!message.values.state.value,
                        formatted: message.values.state.formatted || ""
                    }
                };
            }

            return message;
        }

        function setView(view) {
            activeView = view;
            render();
        }

        function requestArchive(ident, range = "day") {
            activeArchiveIdent = ident;
            activeArchiveRange = range;
            activeView = "archive";
            data.archive = {
                ident,
                label: getMetricLabel(ident, data.values?.[ident]),
                range,
                unit: "",
                available: false,
                points: [],
                message: "Lade Verlauf..."
            };
            render();
            requestAction("MeteredSwitchTile.OpenArchive", JSON.stringify({ ident, range }));
        }

        function render() {
            if (!data.values) {
                data.values = {};
            }
            const hasMeasurements = Object.entries(data.values || {}).some(([ident]) => metricOrder.includes(getBaseIdent(ident)));
            if (!hasMeasurements && activeView !== "power") {
                activeView = "power";
            }

            powerView.classList.toggle("active", activeView === "power");
            powerView.classList.toggle("no-values", !hasMeasurements);
            listView.classList.toggle("active", activeView === "list");
            chartView.classList.toggle("active", activeView === "archive");
            showListRight.classList.toggle("hidden", !hasMeasurements);

            renderSwitches();
            const channelEntries = getChannelEntries();
            const useChannelFilter = shouldUseChannelFilter(channelEntries);
            ensureActiveChannel(channelEntries, useChannelFilter);
            renderChannelTabs(channelEntries, useChannelFilter);

            meterList.replaceChildren();
            meterList.classList.toggle("channel-filtered", useChannelFilter);
            let renderedRows = 0;
            for (const [ident, item] of Object.entries(data.values || {})) {
                const baseIdent = getBaseIdent(ident);
                if (!metricOrder.includes(baseIdent)) {
                    continue;
                }
                if (useChannelFilter && getMetricSuffix(ident, baseIdent) !== activeChannelSuffix) {
                    continue;
                }
                const row = document.createElement("div");
                row.className = "row";
                row.innerHTML = [
                    `<div class="row-icon"><svg viewBox="0 0 24 24" aria-hidden="true">${iconPaths[baseIdent]}</svg></div>`,
                    `<div class="row-label">${escapeHtml(getMetricRowLabel(ident, item, useChannelFilter))}</div>`,
                    `<div class="row-value">${escapeHtml(item.formatted || "")}</div>`,
                    `<button class="archive-button${item.archived ? "" : " placeholder"}" type="button" title="Verlauf" aria-label="Verlauf" data-ident="${ident}">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 19h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                            <path d="M5 16l4-4 3 2 5-7 2 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>`
                ].join("");
                const archiveButton = row.querySelector(".archive-button");
                if (item.archived) {
                    archiveButton.addEventListener("click", () => requestArchive(ident, "day"));
                }
                meterList.appendChild(row);
                renderedRows++;
            }

            if (renderedRows === 0) {
                const row = document.createElement("div");
                row.className = "row";
                row.innerHTML = [
                    '<div class="row-icon"></div>',
                    '<div class="row-label">Keine Messwerte</div>',
                    '<div class="row-value"></div>',
                    '<div></div>'
                ].join("");
                meterList.appendChild(row);
            }

            renderArchive();
        }

        function renderSwitches() {
            const switches = getSwitchEntries();
            const useSwitchList = switches.length > 1;
            primarySwitchIdent = switches[0]?.[0] || "state";

            powerWrap.classList.toggle("hidden", useSwitchList);
            switchList.classList.toggle("hidden", !useSwitchList);

            if (!useSwitchList) {
                const item = switches[0]?.[1];
                powerButton.classList.toggle("off", !(item && item.value));
                switchList.replaceChildren();
                return;
            }

            switchList.replaceChildren();
            for (const [ident, item] of switches) {
                const row = document.createElement("div");
                row.className = "switch-row";
                row.innerHTML = `<span class="switch-state-label">${escapeHtml(item.label || ident)}</span>`;

                const button = document.createElement("button");
                button.className = `switch-toggle${item.value ? " on" : ""}`;
                button.type = "button";
                button.title = item.label || ident;
                button.setAttribute("aria-label", item.label || ident);
                button.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true">${powerIconPath()}</svg>`;
                button.addEventListener("click", () => requestSwitchToggle(ident));
                row.appendChild(button);
                switchList.appendChild(row);
            }
        }

        function getSwitchEntries() {
            const switches = data.switches && typeof data.switches === "object" ? data.switches : {};
            const entries = Object.entries(switches);
            if (entries.length > 0) {
                return entries;
            }

            const state = data.values?.state;
            return state ? [["state", {
                label: labels.state,
                value: !!state.value,
                formatted: state.formatted || ""
            }]] : [];
        }

        function getChannelEntries() {
            return getSwitchEntries().map(([ident], index) => {
                const suffix = ident === "state" ? "" : ident.slice("state".length);
                return {
                    suffix,
                    label: getChannelLabel(suffix, index + 1)
                };
            });
        }

        function shouldUseChannelFilter(channelEntries) {
            if (channelEntries.length < 2) {
                return false;
            }

            const suffixes = channelEntries.map((channel) => channel.suffix).filter((suffix) => suffix !== "");
            return Object.keys(data.values || {}).some((ident) => {
                const baseIdent = getBaseIdent(ident);
                return metricOrder.includes(baseIdent) && suffixes.includes(getMetricSuffix(ident, baseIdent));
            });
        }

        function ensureActiveChannel(channelEntries, useChannelFilter) {
            if (!useChannelFilter || channelEntries.length === 0) {
                activeChannelSuffix = null;
                return;
            }

            if (!channelEntries.some((channel) => channel.suffix === activeChannelSuffix)) {
                activeChannelSuffix = channelEntries[0].suffix;
            }
        }

        function renderChannelTabs(channelEntries, useChannelFilter) {
            channelTabs.classList.toggle("hidden", !useChannelFilter);
            channelTabs.replaceChildren();
            if (!useChannelFilter) {
                return;
            }

            for (const channel of channelEntries) {
                const button = document.createElement("button");
                button.className = `channel-button${channel.suffix === activeChannelSuffix ? " active" : ""}`;
                button.type = "button";
                button.textContent = channel.label;
                button.addEventListener("click", () => {
                    activeChannelSuffix = channel.suffix;
                    render();
                });
                channelTabs.appendChild(button);
            }
        }

        function renderArchive() {
            const archive = data.archive || {};
            const ident = archive.ident || activeArchiveIdent;
            const range = archive.range || activeArchiveRange;
            activeArchiveRange = range || "day";

            chartTitle.textContent = archive.label || getMetricLabel(ident, data.values?.[ident]) || "Verlauf";
            chartSubtitle.textContent = `${rangeLabels[activeArchiveRange] || rangeLabels.day}${archive.unit ? ` · ${archive.unit}` : ""}`;
            rangeButtons.forEach((button) => {
                const isActive = button.dataset.range === activeArchiveRange;
                button.classList.toggle("active", isActive);
            });

            drawArchiveChart(archive);
        }

        function drawArchiveChart(archive) {
            archiveChart.replaceChildren();

            const points = Array.isArray(archive.points) ? archive.points : [];
            if (!archive.available || points.length < 2) {
                chartEmpty.textContent = archive.message || "Keine Archivdaten";
                return;
            }
            chartEmpty.textContent = "";

            const width = 320;
            const height = 150;
            const padLeft = 42;
            const padRight = 12;
            const padTop = 12;
            const padBottom = 32;
            const values = points.map((point) => Number(point.value)).filter((value) => Number.isFinite(value));
            const times = points.map((point) => Number(point.time)).filter((value) => Number.isFinite(value));
            let minValue = Math.min(...values);
            let maxValue = Math.max(...values);
            const minTime = Math.min(...times);
            const maxTime = Math.max(...times);

            if (minValue === maxValue) {
                minValue -= 1;
                maxValue += 1;
            }

            const valueRange = maxValue - minValue;
            const timeRange = Math.max(1, maxTime - minTime);
            const x = (time) => padLeft + ((Number(time) - minTime) / timeRange) * (width - padLeft - padRight);
            const y = (value) => padTop + (1 - ((Number(value) - minValue) / valueRange)) * (height - padTop - padBottom);
            const pathPoints = points
                .filter((point) => Number.isFinite(Number(point.time)) && Number.isFinite(Number(point.value)))
                .map((point) => `${x(point.time).toFixed(1)},${y(point.value).toFixed(1)}`)
                .join(" ");

            const gridValues = [maxValue, minValue + (valueRange / 2), minValue];
            const gridYPositions = [padTop, padTop + ((height - padTop - padBottom) / 2), height - padBottom];
            for (let i = 0; i < gridYPositions.length; i++) {
                const gridY = gridYPositions[i];
                const line = svgElement("line", {
                    x1: padLeft,
                    y1: gridY,
                    x2: width - padRight,
                    y2: gridY,
                    stroke: "rgba(120, 120, 120, 0.28)",
                    "stroke-width": "1"
                });
                archiveChart.appendChild(line);
                archiveChart.appendChild(svgElement("text", {
                    x: padLeft - 5,
                    y: gridY,
                    class: "chart-axis-label right"
                }, formatAxisValue(gridValues[i], archive.unit)));
            }

            const polyline = svgElement("polyline", {
                points: pathPoints,
                fill: "none",
                stroke: "var(--accent)",
                "stroke-width": "1.8",
                "stroke-linecap": "round",
                "stroke-linejoin": "round"
            });
            archiveChart.appendChild(polyline);

            const lastPoint = points[points.length - 1];
            archiveChart.appendChild(svgElement("circle", {
                cx: x(lastPoint.time).toFixed(1),
                cy: y(lastPoint.value).toFixed(1),
                r: "3",
                fill: "var(--accent)"
            }));

            const startDate = new Date(minTime * 1000);
            const endDate = new Date(maxTime * 1000);
            archiveChart.appendChild(svgElement("text", {
                x: padLeft,
                y: height - 13,
                class: "chart-axis-label"
            }, formatAxisTime(startDate, archive.range)));
            archiveChart.appendChild(svgElement("text", {
                x: width - padRight,
                y: height - 13,
                class: "chart-axis-label right"
            }, formatAxisTime(endDate, archive.range)));
        }

        function formatAxisValue(value, unit) {
            const absValue = Math.abs(value);
            const digits = absValue >= 100 ? 0 : absValue >= 10 ? 1 : 2;
            return `${new Intl.NumberFormat("de-DE", {
                maximumFractionDigits: digits
            }).format(value)}${unit ? ` ${unit}` : ""}`;
        }

        function formatAxisTime(date, range) {
            if (range === "day") {
                return date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
            }

            return date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
        }

        function svgElement(name, attributes, text = null) {
            const element = document.createElementNS("http://www.w3.org/2000/svg", name);
            for (const [key, value] of Object.entries(attributes)) {
                element.setAttribute(key, value);
            }
            if (text !== null) {
                element.textContent = text;
            }
            return element;
        }

        function requestSwitchToggle(ident) {
            requestAction("MeteredSwitchTile.Toggle", JSON.stringify({ ident }));
        }

        function getBaseIdent(ident) {
            for (const baseIdent of ["state", ...metricOrder]) {
                if (ident === baseIdent || ident.startsWith(`${baseIdent}_`)) {
                    return baseIdent;
                }
            }

            return ident;
        }

        function getMetricLabel(ident, item = null) {
            if (item && item.label) {
                return item.label;
            }

            const baseIdent = getBaseIdent(ident);
            if (ident === baseIdent) {
                return labels[baseIdent] || ident;
            }

            return `${labels[baseIdent] || baseIdent} ${ident.slice(baseIdent.length).replace(/^_/, "").toUpperCase()}`;
        }

        function getMetricRowLabel(ident, item, useChannelFilter) {
            if (!useChannelFilter) {
                return getMetricLabel(ident, item);
            }

            return labels[getBaseIdent(ident)] || getMetricLabel(ident, item);
        }

        function getMetricSuffix(ident, baseIdent) {
            return ident === baseIdent ? "" : ident.slice(baseIdent.length);
        }

        function getChannelLabel(suffix, fallbackNumber) {
            const numericMatch = suffix.match(/^_(\d+)$/);
            if (numericMatch) {
                return numericMatch[1];
            }

            const lineMatch = suffix.match(/^_l(\d+)$/i);
            if (lineMatch) {
                return `L${lineMatch[1]}`;
            }

            return String(fallbackNumber);
        }

        function powerIconPath() {
            return '<path d="M12 2v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><path d="M7.4 5.6a8 8 0 1 0 9.2 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.getElementById("showListRight").addEventListener("click", () => setView("list"));
        document.getElementById("showPowerRight").addEventListener("click", () => setView("power"));
        document.getElementById("showListFromChart").addEventListener("click", () => setView("list"));
        rangeButtons.forEach((button) => {
            button.addEventListener("click", () => {
                if (!activeArchiveIdent) {
                    return;
                }
                requestArchive(activeArchiveIdent, button.dataset.range || "day");
            });
        });
        powerButton.addEventListener("click", () => requestSwitchToggle(primarySwitchIdent));

        render();
    </script>
</body>
</html>
