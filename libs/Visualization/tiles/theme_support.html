<style>
    :root {
        color-scheme: light dark;
        --z2m-theme-light-text: #111111;
        --z2m-theme-light-muted: #667085;
        --z2m-theme-light-line: rgba(17, 24, 39, 0.12);
        --z2m-theme-light-chip: rgba(0, 0, 0, 0.055);
        --z2m-theme-dark-text: #f4f7fb;
        --z2m-theme-dark-muted: rgba(244, 247, 251, 0.72);
        --z2m-theme-dark-line: rgba(244, 247, 251, 0.18);
        --z2m-theme-dark-chip: rgba(244, 247, 251, 0.11);
    }

    @media (prefers-color-scheme: dark) {
        :root:not([data-z2m-theme="light"]) {
            --text: var(--z2m-theme-dark-text);
            --muted: var(--z2m-theme-dark-muted);
            --line: var(--z2m-theme-dark-line);
            --chip: var(--z2m-theme-dark-chip);
        }
    }

    :root[data-z2m-theme="light"] {
        --text: var(--z2m-theme-light-text);
        --muted: var(--z2m-theme-light-muted);
        --line: var(--z2m-theme-light-line);
        --chip: var(--z2m-theme-light-chip);
    }

    :root[data-z2m-theme="dark"] {
        --text: var(--z2m-theme-dark-text);
        --muted: var(--z2m-theme-dark-muted);
        --line: var(--z2m-theme-dark-line);
        --chip: var(--z2m-theme-dark-chip);
    }
</style>
<script>
    (function () {
        const root = document.documentElement;
        const darkQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

        function parseCssColor(value) {
            if (!value || value === "transparent") {
                return null;
            }

            const match = value.match(/rgba?\(([^)]+)\)/i);
            if (!match) {
                return null;
            }

            const parts = match[1].trim().split(/[,\s/]+/).filter(Boolean);
            if (parts.length < 3) {
                return null;
            }

            const color = {
                r: parseChannel(parts[0]),
                g: parseChannel(parts[1]),
                b: parseChannel(parts[2]),
                a: parts.length > 3 ? parseAlpha(parts[3]) : 1
            };

            return Number.isFinite(color.r) && Number.isFinite(color.g) && Number.isFinite(color.b) ? color : null;
        }

        function parseChannel(value) {
            const number = Number.parseFloat(value);
            if (!Number.isFinite(number)) {
                return NaN;
            }

            return value.endsWith("%")
                ? Math.max(0, Math.min(255, Math.round((number / 100) * 255)))
                : Math.max(0, Math.min(255, Math.round(number)));
        }

        function parseAlpha(value) {
            const number = Number.parseFloat(value);
            if (!Number.isFinite(number)) {
                return 1;
            }

            return value.endsWith("%")
                ? Math.max(0, Math.min(1, number / 100))
                : Math.max(0, Math.min(1, number));
        }

        function relativeLuminance(color) {
            const channels = [color.r, color.g, color.b].map((channel) => {
                const value = channel / 255;
                return value <= 0.03928 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
            });

            return (0.2126 * channels[0]) + (0.7152 * channels[1]) + (0.0722 * channels[2]);
        }

        function colorToRgb(color) {
            return `rgb(${color.r}, ${color.g}, ${color.b})`;
        }

        function colorToRgba(color, alpha) {
            return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
        }

        function contrastRatio(firstColor, secondColor) {
            const firstLuminance = relativeLuminance(firstColor);
            const secondLuminance = relativeLuminance(secondColor);
            const lighter = Math.max(firstLuminance, secondLuminance);
            const darker = Math.min(firstLuminance, secondLuminance);

            return (lighter + 0.05) / (darker + 0.05);
        }

        function findParentStyleColor(property) {
            try {
                if (!window.parent || window.parent === window || !window.frameElement) {
                    return null;
                }

                let element = property === "color" ? window.frameElement.parentElement : window.frameElement;
                for (let i = 0; element && i < 12; i += 1) {
                    const color = parseCssColor(window.parent.getComputedStyle(element)[property]);
                    if (color && color.a > 0.05) {
                        return color;
                    }
                    element = element.parentElement;
                }
            } catch (error) {
                return null;
            }

            return null;
        }

        function applyTextColor(color) {
            const isBrightText = relativeLuminance(color) > 0.5;
            root.dataset.z2mTheme = isBrightText ? "dark" : "light";
            root.style.colorScheme = isBrightText ? "dark" : "light";
            root.style.setProperty("--text", colorToRgb(color));
            root.style.setProperty("--muted", colorToRgba(color, isBrightText ? 0.72 : 0.62));
            root.style.setProperty("--line", colorToRgba(color, isBrightText ? 0.18 : 0.12));
            root.style.setProperty("--chip", colorToRgba(color, isBrightText ? 0.11 : 0.055));
        }

        function applyPresetTheme(isDark) {
            root.dataset.z2mTheme = isDark ? "dark" : "light";
            root.style.colorScheme = isDark ? "dark" : "light";
            root.style.removeProperty("--text");
            root.style.removeProperty("--muted");
            root.style.removeProperty("--line");
            root.style.removeProperty("--chip");
        }

        function applyTheme() {
            const parentTextColor = findParentStyleColor("color");
            const parentBackgroundColor = findParentStyleColor("backgroundColor");
            if (parentTextColor && (!parentBackgroundColor || contrastRatio(parentTextColor, parentBackgroundColor) >= 3)) {
                applyTextColor(parentTextColor);
                return;
            }

            if (parentBackgroundColor) {
                applyPresetTheme(relativeLuminance(parentBackgroundColor) < 0.45);
                return;
            }

            applyPresetTheme(darkQuery ? darkQuery.matches : false);
        }

        function observeParentTheme() {
            try {
                if (!window.parent || window.parent === window || !window.parent.document) {
                    return;
                }

                const observer = new MutationObserver(() => window.requestAnimationFrame(applyTheme));
                observer.observe(window.parent.document.documentElement, {
                    attributes: true,
                    attributeFilter: ["class", "style", "data-theme", "data-color-scheme"]
                });
                if (window.parent.document.body) {
                    observer.observe(window.parent.document.body, {
                        attributes: true,
                        attributeFilter: ["class", "style", "data-theme", "data-color-scheme"]
                    });
                }
            } catch (error) {
                // Theme detection is best-effort. CSS media fallback remains active.
            }
        }

        applyTheme();
        window.addEventListener("load", applyTheme);
        setTimeout(applyTheme, 150);
        observeParentTheme();

        if (darkQuery && darkQuery.addEventListener) {
            darkQuery.addEventListener("change", applyTheme);
        } else if (darkQuery && darkQuery.addListener) {
            darkQuery.addListener(applyTheme);
        }
    })();
</script>
