<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent: #f1a33c;
            --accent-strong: #ffb74d;
            --warm: #ff9b45;
            --neutral: #fff0ca;
            --cool: #d8eaff;
            --track: color-mix(in srgb, currentColor 15%, transparent);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        button,
        input {
            font: inherit;
        }

        .tile {
            display: grid;
            grid-template-rows: minmax(0, 1fr) minmax(36px, auto);
            gap: 14px;
            width: 100%;
            height: 100%;
            min-height: 240px;
            padding: 58px 18px 18px;
            color: var(--text);
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(112px, 0.42fr) minmax(180px, 1fr);
            align-items: center;
            gap: clamp(18px, 5vw, 38px);
            min-height: 0;
        }

        .power-area {
            display: grid;
            justify-items: center;
            gap: 10px;
        }

        .power-button {
            position: relative;
            display: grid;
            place-items: center;
            width: clamp(84px, 24vw, 126px);
            height: clamp(84px, 24vw, 126px);
            border: 1px solid var(--line);
            border-radius: 50%;
            color: var(--muted);
            background: var(--chip);
            box-shadow: inset 0 0 0 7px color-mix(in srgb, currentColor 3%, transparent);
            cursor: pointer;
            transition: transform 120ms ease, color 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }

        .power-button:hover {
            transform: scale(1.025);
        }

        .power-button:active {
            transform: scale(0.97);
        }

        .tile.on .power-button {
            color: #fff7e8;
            border-color: color-mix(in srgb, var(--accent) 55%, transparent);
            background: radial-gradient(circle at 50% 38%, #ffd98a 0%, var(--accent) 58%, #dc7e21 100%);
            box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 38%, transparent);
        }

        .bulb-icon {
            width: 46%;
            height: 46%;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 1.7;
        }

        .power-caption {
            color: var(--muted);
            font-size: var(--z2m-font-small);
        }

        .slider-stack {
            display: grid;
            align-content: center;
            gap: clamp(18px, 4vh, 28px);
            min-width: 0;
        }

        .control {
            display: grid;
            gap: 9px;
            min-width: 0;
        }

        .control.hidden {
            display: none;
        }

        .control-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .control-label {
            color: var(--muted);
            font-size: var(--z2m-font-caption);
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .control-value {
            font-size: var(--z2m-font-normal);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .range-wrap {
            position: relative;
            display: grid;
            align-items: center;
            height: 28px;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            margin: 0;
            border-radius: 999px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 22px;
            height: 22px;
            border: 2px solid color-mix(in srgb, currentColor 24%, transparent);
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.25);
            appearance: none;
        }

        input[type="range"]::-moz-range-thumb {
            width: 19px;
            height: 19px;
            border: 2px solid color-mix(in srgb, currentColor 24%, transparent);
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.25);
        }

        #temperatureSlider {
            background: linear-gradient(90deg, var(--warm), var(--neutral) 48%, var(--cool));
        }

        .temperature-scale {
            display: flex;
            justify-content: space-between;
            margin-top: -4px;
            color: var(--muted);
            font-size: var(--z2m-font-axis);
            font-variant-numeric: tabular-nums;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
            gap: 8px;
            min-height: 36px;
        }

        .presets.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .tile.no-presets {
            grid-template-rows: minmax(0, 1fr) 0;
            gap: 0;
        }

        .tile.no-presets .presets {
            min-height: 0;
        }

        .preset-button {
            min-width: 0;
            height: 36px;
            padding: 0 9px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            background: var(--chip);
            cursor: pointer;
            font-size: var(--z2m-font-small);
            font-weight: 500;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .preset-button:hover {
            border-color: color-mix(in srgb, var(--accent) 60%, transparent);
            background: color-mix(in srgb, var(--accent) 11%, transparent);
        }

        .preset-button.active {
            border-color: var(--accent);
            color: #ffffff;
            background: var(--accent);
        }

        .tile.off .slider-stack,
        .tile.off .presets {
            opacity: 0.72;
        }

        @media (max-width: 430px), (max-height: 310px) {
            .tile {
                gap: 10px;
                padding: 52px 14px 14px;
            }

            .controls {
                grid-template-columns: 86px minmax(0, 1fr);
                gap: 15px;
            }

            .power-button {
                width: 76px;
                height: 76px;
            }

            .power-caption,
            .temperature-scale {
                display: none;
            }

            .slider-stack {
                gap: 13px;
            }

            .presets {
                grid-template-columns: repeat(auto-fit, minmax(68px, 1fr));
                gap: 6px;
            }

            .preset-button {
                height: 32px;
                padding: 0 6px;
            }
        }

        @media (max-width: 300px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .power-area {
                display: none;
            }
        }
    </style>
    __THEME_SUPPORT__
</head>
<body>
    <main id="tile" class="tile">
        <section class="controls">
            <div class="power-area">
                <button id="powerButton" class="power-button" type="button">
                    <svg class="bulb-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 18h6"></path>
                        <path d="M10 21h4"></path>
                        <path d="M8.2 14.5A6 6 0 1 1 15.8 14.5C14.8 15.3 14.5 16 14.5 17h-5c0-1-.3-1.7-1.3-2.5Z"></path>
                    </svg>
                </button>
                <div id="powerCaption" class="power-caption"></div>
            </div>

            <div class="slider-stack">
                <div id="brightnessControl" class="control">
                    <div class="control-header">
                        <span id="brightnessLabel" class="control-label">Brightness</span>
                        <span id="brightnessValue" class="control-value"></span>
                    </div>
                    <div class="range-wrap">
                        <input id="brightnessSlider" type="range">
                    </div>
                </div>

                <div id="temperatureControl" class="control">
                    <div class="control-header">
                        <span id="temperatureLabel" class="control-label">Color temperature</span>
                        <span id="temperatureValue" class="control-value"></span>
                    </div>
                    <div class="range-wrap">
                        <input id="temperatureSlider" type="range">
                    </div>
                    <div class="temperature-scale">
                        <span id="temperatureMin"></span>
                        <span id="temperatureMax"></span>
                    </div>
                </div>
            </div>
        </section>

        <section id="presets" class="presets"></section>
    </main>

    <script>
        let data = __INITIAL_DATA__;
        let presetLayoutReserved = Array.isArray(data.presets) && data.presets.length > 0;

        const tile = document.getElementById("tile");
        const powerButton = document.getElementById("powerButton");
        const powerCaption = document.getElementById("powerCaption");
        const brightnessLabel = document.getElementById("brightnessLabel");
        const brightnessControl = document.getElementById("brightnessControl");
        const brightnessSlider = document.getElementById("brightnessSlider");
        const brightnessValue = document.getElementById("brightnessValue");
        const temperatureControl = document.getElementById("temperatureControl");
        const temperatureLabel = document.getElementById("temperatureLabel");
        const temperatureSlider = document.getElementById("temperatureSlider");
        const temperatureValue = document.getElementById("temperatureValue");
        const temperatureMin = document.getElementById("temperatureMin");
        const temperatureMax = document.getElementById("temperatureMax");
        const presets = document.getElementById("presets");

        function normalizeMessage(message) {
            if (message && typeof message === "object") {
                return message;
            }
            if (typeof message !== "string") {
                return null;
            }
            try {
                const decoded = JSON.parse(message);
                return decoded && typeof decoded === "object" ? decoded : null;
            } catch (error) {
                return null;
            }
        }

        function handleMessage(message) {
            const nextData = normalizeMessage(message);
            if (!nextData) {
                return;
            }
            data = nextData;
            render();
        }

        function sendAction(ident, value) {
            if (typeof requestAction === "function") {
                requestAction(ident, value);
            }
        }

        function number(value, fallback = 0) {
            const result = Number(value);
            return Number.isFinite(result) ? result : fallback;
        }

        function setRange(slider, config) {
            slider.min = String(number(config.min));
            slider.max = String(number(config.max, 100));
            slider.step = String(Math.max(Number.EPSILON, number(config.step, 1)));
            slider.value = String(number(config.value, number(config.min)));
        }

        function renderBrightness() {
            const config = data.brightness || {};
            const available = Boolean(config.available);
            brightnessControl.classList.toggle("hidden", !available);
            if (!available) {
                return;
            }

            setRange(brightnessSlider, config);
            const percent = Math.max(0, Math.min(100, Math.round(number(config.percent))));
            brightnessValue.textContent = `${percent} %`;
            brightnessSlider.style.background = `linear-gradient(90deg, var(--accent) 0%, var(--accent) ${percent}%, var(--track) ${percent}%, var(--track) 100%)`;
        }

        function renderTemperature() {
            const config = data.colorTemperature || {};
            const available = Boolean(config.available);
            temperatureControl.classList.toggle("hidden", !available);
            if (!available) {
                return;
            }

            setRange(temperatureSlider, config);
            const kelvin = Math.round(number(config.value, number(config.min)));
            temperatureValue.textContent = `${kelvin} K`;
            temperatureMin.textContent = `${Math.round(number(config.min))} K`;
            temperatureMax.textContent = `${Math.round(number(config.max))} K`;
        }

        function renderPresets() {
            const items = Array.isArray(data.presets) ? data.presets : [];
            if (items.length > 0) {
                presetLayoutReserved = true;
            }
            tile.classList.toggle("no-presets", !presetLayoutReserved);
            presets.classList.toggle("hidden", items.length === 0);
            const currentMired = Math.round(number(data.colorTemperature?.mired));
            const fragment = document.createDocumentFragment();

            for (const preset of items) {
                const button = document.createElement("button");
                const presetValue = Math.round(number(preset.value));
                button.className = `preset-button${presetValue === currentMired ? " active" : ""}`;
                button.type = "button";
                button.textContent = String(preset.caption || `${preset.kelvin} K`);
                button.title = `${Math.round(number(preset.kelvin))} K`;
                button.addEventListener("click", () => {
                    data.colorTemperature.mired = presetValue;
                    data.colorTemperature.value = Math.round(number(preset.kelvin));
                    renderTemperature();
                    renderPresets();
                    sendAction("TunableWhiteTile.SetPreset", presetValue);
                });
                fragment.appendChild(button);
            }
            presets.replaceChildren(fragment);
        }

        function render() {
            const isOn = Boolean(data.state?.value);
            tile.classList.toggle("on", isOn);
            tile.classList.toggle("off", !isOn);
            brightnessLabel.textContent = String(data.labels?.brightness || "Brightness");
            temperatureLabel.textContent = String(data.labels?.colorTemperature || "Color temperature");
            powerButton.title = String(data.labels?.toggle || "Turn light on/off");
            powerCaption.textContent = String(data.state?.formatted || "");
            renderBrightness();
            renderTemperature();
            renderPresets();
        }

        powerButton.addEventListener("click", () => {
            if (!data.state) {
                data.state = {};
            }
            data.state.value = !Boolean(data.state.value);
            render();
            sendAction("TunableWhiteTile.Toggle", true);
        });

        brightnessSlider.addEventListener("input", () => {
            const config = data.brightness || {};
            config.value = number(brightnessSlider.value);
            const span = number(config.max) - number(config.min);
            config.percent = span > 0 ? Math.round((config.value - number(config.min)) * 100 / span) : 0;
            renderBrightness();
        });

        brightnessSlider.addEventListener("change", () => {
            sendAction("TunableWhiteTile.SetBrightness", number(brightnessSlider.value));
        });

        temperatureSlider.addEventListener("input", () => {
            if (!data.colorTemperature) {
                data.colorTemperature = {};
            }
            data.colorTemperature.value = Math.round(number(temperatureSlider.value));
            temperatureValue.textContent = `${data.colorTemperature.value} K`;
        });

        temperatureSlider.addEventListener("change", () => {
            sendAction("TunableWhiteTile.SetColorTemperature", Math.round(number(temperatureSlider.value)));
        });

        render();
    </script>
</body>
</html>
