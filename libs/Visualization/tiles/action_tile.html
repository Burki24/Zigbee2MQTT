<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent: #10c8b2;
            --power: #10c8b2;
            --brightness: #f5b942;
            --color: #8e5cf7;
            --scene: #2f80ed;
            --switch: #607d8b;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        button {
            font: inherit;
        }

        .tile {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 240px;
            overflow: hidden;
        }

        .view {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
            padding: 18px;
        }

        .view.active {
            display: block;
        }

        .nav-button {
            position: absolute;
            top: 74px;
            right: 42px;
            display: grid;
            place-items: center;
            width: 50px;
            height: 50px;
            border: 0;
            border-radius: 50%;
            color: var(--text);
            background: transparent;
            cursor: pointer;
            z-index: 3;
        }

        .nav-button:hover,
        .nav-button.active {
            background: var(--chip);
        }

        .nav-button.hidden {
            display: none;
        }

        .nav-icon {
            width: 27px;
            height: 27px;
        }

        .action-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            display: grid;
            justify-items: center;
            gap: 13px;
            width: min(82vw, 370px);
            max-width: calc(100% - 84px);
            transform: translate(-50%, -40%);
        }

        .action-orb {
            --state-color: var(--accent);
            display: grid;
            place-items: center;
            width: min(30vw, 30vh, 132px);
            height: min(30vw, 30vh, 132px);
            min-width: 94px;
            min-height: 94px;
            border-radius: 50%;
            color: #ffffff;
            background: var(--state-color);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.12);
        }

        .action-orb.power {
            --state-color: var(--power);
        }

        .action-orb.brightness {
            --state-color: var(--brightness);
        }

        .action-orb.color {
            --state-color: var(--color);
        }

        .action-orb.scene {
            --state-color: var(--scene);
        }

        .action-orb.switch {
            --state-color: var(--switch);
        }

        .action-icon {
            width: 54%;
            height: 54%;
        }

        .action-text {
            display: grid;
            justify-items: center;
            gap: 3px;
            width: 100%;
        }

        .action-value {
            overflow: hidden;
            max-width: 100%;
            color: var(--text);
            font-size: clamp(1.8em, 9vw, 3em);
            font-weight: 400;
            line-height: 1.05;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .action-caption {
            overflow: hidden;
            max-width: 100%;
            color: var(--muted);
            font-size: 0.75em;
            letter-spacing: 0;
            text-align: center;
            text-overflow: ellipsis;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .summary-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 30px;
            overflow: hidden;
        }

        .summary-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
            max-width: 45%;
            height: 28px;
            padding: 0 9px;
            border-radius: 7px;
            color: var(--muted);
            background: var(--chip);
            font-size: 0.8em;
        }

        .summary-chip svg {
            width: 16px;
            height: 16px;
            flex: 0 0 auto;
        }

        .summary-chip span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .detail-list {
            position: absolute;
            left: 22px;
            right: 22px;
            top: 126px;
            bottom: 18px;
            display: grid;
            align-content: start;
            gap: 0;
            overflow: hidden;
        }

        .row {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr) auto;
            align-items: center;
            min-height: 36px;
            gap: 8px;
            color: var(--text);
        }

        .row-icon {
            display: grid;
            place-items: center;
            color: var(--muted);
        }

        .row-icon.power {
            color: var(--power);
        }

        .row-icon.brightness {
            color: var(--brightness);
        }

        .row-icon.color {
            color: var(--color);
        }

        .row-icon.scene {
            color: var(--scene);
        }

        .row-icon.switch {
            color: var(--switch);
        }

        .row-icon svg {
            width: 22px;
            height: 22px;
        }

        .row-label,
        .row-value {
            overflow: hidden;
            font-size: 1em;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .row-value {
            max-width: 46vw;
            text-align: right;
        }

        .option-strip {
            position: absolute;
            left: 22px;
            right: 22px;
            bottom: 18px;
            display: flex;
            gap: 6px;
            overflow: hidden;
        }

        .option-chip {
            display: inline-flex;
            align-items: center;
            min-width: 0;
            max-width: 140px;
            height: 28px;
            padding: 0 9px;
            border-radius: 7px;
            color: var(--muted);
            background: var(--chip);
            font-size: 0.8em;
            white-space: nowrap;
        }

        .option-chip span {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 340px), (max-height: 300px) {
            .nav-button {
                top: 58px;
                right: 24px;
                width: 44px;
                height: 44px;
            }

            .action-wrap {
                width: min(86vw, 280px);
                transform: translate(-50%, -38%);
            }

            .action-orb {
                min-width: 82px;
                min-height: 82px;
            }

            .detail-list {
                top: 108px;
                left: 18px;
                right: 18px;
            }

            .row {
                min-height: 33px;
            }

            .row-label,
            .row-value {
                font-size: 0.9em;
            }
        }
    </style>
    __THEME_SUPPORT__
</head>
<body>
    <main class="tile">
        <section class="view main-view active" id="mainView">
            <button class="nav-button" id="showDetails" type="button" title="Details">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 6h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M8 12h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M8 18h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M3 6h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                    <path d="M3 12h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                    <path d="M3 18h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                </svg>
            </button>

            <div class="action-wrap">
                <div class="action-orb" id="actionOrb">
                    <svg class="action-icon" id="actionIcon" viewBox="0 0 24 24" aria-hidden="true"></svg>
                </div>
                <div class="action-text">
                    <div class="action-value" id="actionValue">Bereit</div>
                    <div class="action-caption" id="actionCaption">Aktion</div>
                </div>
                <div class="summary-row" id="summaryRow"></div>
            </div>
            <div class="option-strip" id="optionStrip"></div>
        </section>

        <section class="view detail-view" id="detailView">
            <button class="nav-button active" id="showMain" type="button" title="Aktion">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="5" y="6" width="14" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"></rect>
                    <path d="M9 12h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
            </button>
            <div class="detail-list" id="detailList"></div>
        </section>
    </main>

    <script>
        let data = __INITIAL_DATA__;
        let activeView = "main";

        const detailOrder = ["action", "scene", "click", "button", "action_duration", "battery", "battery_low", "device_status", "linkquality", "last_seen"];
        const iconPaths = {
            button: '<rect x="5" y="6" width="14" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"></rect><path d="M9 12h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            power: '<path d="M12 2v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><path d="M7.4 5.6a8 8 0 1 0 9.2 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',
            brightness: '<circle cx="12" cy="12" r="4.4" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="M12 3v2.2M12 18.8V21M4.2 12H2M22 12h-2.2M17.5 6.5l1.6-1.6M4.9 19.1l1.6-1.6M6.5 6.5 4.9 4.9M19.1 19.1l-1.6-1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            color: '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="M12 4v16M4 12h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            scene: '<path d="M4 5h16v14H4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="m7 15 3-3 2 2 4-5 1 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>',
            switch: '<path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M8 8h8v8H8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>',
            battery: '<path d="M3 8h15a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="M20 10.5h1.5v3H20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            signal: '<path d="M4 19h.01" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"></path><path d="M8.5 15.5a5 5 0 0 1 7 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M5 12a10 10 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            clock: '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>',
            device: '<path d="M8 2v6M16 2v6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M6 8h12v3a6 6 0 0 1-12 0V8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="M12 17v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            duration: '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>',
            detail: '<path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M2 14h4M10 8h4M18 16h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>'
        };

        const mainView = document.getElementById("mainView");
        const detailView = document.getElementById("detailView");
        const showDetails = document.getElementById("showDetails");
        const actionOrb = document.getElementById("actionOrb");
        const actionIcon = document.getElementById("actionIcon");
        const actionValue = document.getElementById("actionValue");
        const actionCaption = document.getElementById("actionCaption");
        const summaryRow = document.getElementById("summaryRow");
        const optionStrip = document.getElementById("optionStrip");
        const detailList = document.getElementById("detailList");

        function handleMessage(message) {
            const nextData = normalizeMessage(message);
            if (!nextData) {
                return;
            }

            data = nextData;
            render();
        }

        function normalizeMessage(message) {
            if (Array.isArray(message) && message.length === 1) {
                message = message[0];
            }
            if (typeof message === "string") {
                try {
                    message = JSON.parse(message);
                } catch {
                    return null;
                }
            }
            if (!message || typeof message !== "object" || message.type !== "action") {
                return null;
            }
            if (!message.values || typeof message.values !== "object") {
                message.values = {};
            }
            if (!message.primary || typeof message.primary !== "object") {
                message.primary = { formatted: "Bereit", label: "Aktion", category: "button", icon: "button" };
            }
            if (!message.triggers || typeof message.triggers !== "object") {
                message.triggers = {};
            }

            return message;
        }

        function setView(view) {
            activeView = view;
            render();
        }

        function render() {
            if (!normalizeMessage(data)) {
                data = { type: "action", primary: {}, triggers: {}, values: {} };
            }

            const hasDetails = Object.keys(data.values || {}).length > 1;
            if (!hasDetails && activeView !== "main") {
                activeView = "main";
            }

            mainView.classList.toggle("active", activeView === "main");
            detailView.classList.toggle("active", activeView === "details");
            showDetails.classList.toggle("hidden", !hasDetails);
            renderMain();
            renderDetails();
        }

        function renderMain() {
            const primary = data.primary || {};
            const category = primary.category || "button";
            actionOrb.className = `action-orb ${category}`;
            actionIcon.innerHTML = iconPaths[primary.icon] || iconPaths.button;
            actionValue.textContent = primary.formatted || "Bereit";
            actionCaption.textContent = primary.label || "Aktion";
            renderSummary();
            renderOptions(primary.ident);
        }

        function renderSummary() {
            summaryRow.replaceChildren();
            for (const ident of ["battery", "linkquality"]) {
                const item = data.values?.[ident];
                if (!item) {
                    continue;
                }
                const chip = document.createElement("div");
                chip.className = "summary-chip";
                chip.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true">${iconPaths[ident === "battery" ? "battery" : "signal"]}</svg><span>${escapeHtml(item.formatted || "")}</span>`;
                summaryRow.appendChild(chip);
            }
        }

        function renderOptions(primaryIdent) {
            optionStrip.replaceChildren();
            const trigger = primaryIdent && data.triggers ? data.triggers[primaryIdent] : Object.values(data.triggers || {})[0];
            const options = Array.isArray(trigger?.options) ? trigger.options.slice(0, 5) : [];
            for (const option of options) {
                const chip = document.createElement("div");
                chip.className = "option-chip";
                chip.innerHTML = `<span>${escapeHtml(option.formatted || option.value || "")}</span>`;
                optionStrip.appendChild(chip);
            }
        }

        function renderDetails() {
            detailList.replaceChildren();
            for (const [ident, item] of orderedEntries(data.values || {})) {
                const row = document.createElement("div");
                row.className = "row";
                const icon = iconFor(item);
                row.innerHTML = [
                    `<div class="row-icon ${escapeHtml(item.category || "")}"><svg viewBox="0 0 24 24" aria-hidden="true">${iconPaths[icon] || iconPaths.detail}</svg></div>`,
                    `<div class="row-label">${escapeHtml(item.label || ident)}</div>`,
                    `<div class="row-value">${escapeHtml(item.formatted || "")}</div>`
                ].join("");
                detailList.appendChild(row);
            }
        }

        function orderedEntries(values) {
            const entries = Object.entries(values);
            const order = new Map(detailOrder.map((ident, index) => [ident, index]));
            return entries.sort(([a], [b]) => (order.get(a) ?? 999) - (order.get(b) ?? 999));
        }

        function iconFor(item) {
            if (item.kind === "battery") {
                return "battery";
            }
            if (item.kind === "signal") {
                return "signal";
            }
            if (item.kind === "clock") {
                return "clock";
            }
            if (item.kind === "device") {
                return "device";
            }
            if (item.kind === "duration") {
                return "duration";
            }
            if (item.kind === "trigger") {
                return item.category || "button";
            }

            return "detail";
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        document.getElementById("showDetails").addEventListener("click", () => setView("details"));
        document.getElementById("showMain").addEventListener("click", () => setView("main"));

        render();
    </script>
</body>
</html>
