<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --tile-title-clearance: 58px;
        }

        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            min-height: 240px;
            margin: 0;
            background: transparent;
        }
        body { display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; }
        header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px 12px;
            align-items: end;
            padding: var(--tile-title-clearance) 14px 8px;
        }
        #status {
            overflow: hidden;
            margin-bottom: 4px;
            font-size: var(--z2m-font-small, 0.86em);
            font-weight: 500;
            line-height: 1.25;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            font-size: var(--z2m-font-caption, 0.78em);
            line-height: 1.25;
            opacity: 0.76;
        }
        .tools { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
        .tools[hidden], #status[hidden], .summary[hidden] { display: none; }
        :fullscreen header { padding-top: 14px; }
        button, input, select { font: inherit; color: inherit; }
        button {
            min-height: 30px;
            border: 1px solid var(--line, currentColor);
            border-radius: 3px;
            background: var(--chip, transparent);
            padding: 4px 8px;
            font-size: var(--z2m-font-caption, 0.78em);
            white-space: nowrap;
            cursor: pointer;
            opacity: 0.82;
        }
        button:hover { opacity: 1; }
        main { position: relative; min-height: 0; }
        #graph { position: absolute; inset: 0; }
        .empty {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 24px;
            font-size: var(--z2m-font-small, 0.86em);
            opacity: 0.65;
        }
        .empty.error { opacity: 1; }
        .details { position: absolute; left: 12px; bottom: 12px; max-width: min(420px, calc(100% - 24px)); padding: 9px 11px; border: 1px solid currentColor; background: color-mix(in srgb, Canvas 90%, transparent); display: none; }
        .details strong { display: block; margin-bottom: 3px; }
        @media (max-width: 520px) {
            header { grid-template-columns: 1fr; }
            .tools { justify-content: flex-start; }
            .tools button:nth-child(3) { display: none; }
        }
    </style>
    __THEME_SUPPORT__
    <script>(function(module, exports, define) { __CYTOSCAPE__ }).call(window, undefined, undefined, undefined);</script>
</head>
<body>
<header>
    <div id="overview">
        <div id="status" hidden></div>
        <div class="summary" id="summary" hidden></div>
    </div>
    <div class="tools" id="tools" hidden>
        <button type="button" id="fit" title="Ansicht einpassen">Einpassen</button>
        <button type="button" id="weak" title="Schwache Verbindungen hervorheben">Schwache LQI</button>
        <button type="button" id="routes" title="Nur Verbindungen mit Routen anzeigen">Routen</button>
        <button type="button" id="fullscreen" title="Netzwerkkarte im Vollbild anzeigen">Vollbild</button>
    </div>
</header>
<main>
    <div id="graph"></div>
    <div class="empty" id="empty">Noch keine Netzwerkanalyse vorhanden.</div>
    <div class="details" id="details"></div>
</main>
<script>
    const initialData = __INITIAL_DATA__;
    let currentData = initialData;
    let weakOnly = false;
    let routesOnly = false;
    let cy = null;
    let resizeFrame = 0;
    let stateRequestPending = false;

    function render(data) {
        currentData = data || currentData;
        const textColor = getComputedStyle(document.body).color;
        const summary = currentData.summary || {};
        const status = document.getElementById('status');
        const summaryElement = document.getElementById('summary');
        const tools = document.getElementById('tools');
        const empty = document.getElementById('empty');
        const scanStatus = currentData.scan?.status || '';
        const elements = [...(currentData.nodes || []), ...(currentData.links || [])];
        const hasTopology = elements.length > 0;
        const isRunning = Boolean(currentData.scan?.running);

        status.textContent = scanStatus;
        status.hidden = !hasTopology && !isRunning;
        summaryElement.innerHTML =
            `<span>${summary.devices || 0} Geräte</span>` +
            `<span>${summary.routers || 0} Router</span>` +
            `<span>${summary.end_devices || 0} Endgeräte</span>` +
            `<span>${summary.links || 0} Verbindungen</span>` +
            `<span>${summary.routes || 0} Routen</span>` +
            `<span>${summary.failures || 0} Scanfehler</span>` +
            (summary.omitted_links ? `<span>${summary.omitted_links} nicht darstellbar</span>` : '');
        summaryElement.hidden = !hasTopology;
        tools.hidden = !hasTopology;
        empty.textContent = isRunning ? scanStatus : 'Noch keine Netzwerkanalyse vorhanden.';

        empty.style.display = hasTopology ? 'none' : 'grid';
        if (!hasTopology) {
            return;
        }
        if (typeof globalThis.cytoscape !== 'function') {
            showRenderError('Die Grafikbibliothek konnte nicht geladen werden.');
            return;
        }

        try {
            if (cy) {
                cy.destroy();
            }
            const threshold = Number(currentData.threshold || 50);
            cy = globalThis.cytoscape({
                container: document.getElementById('graph'),
                elements,
                wheelSensitivity: 0.2,
                hideEdgesOnViewport: true,
                textureOnViewport: true,
                style: [
                    { selector: 'node', style: {
                        'label': 'data(label)', 'font-size': 9, 'text-wrap': 'wrap', 'text-max-width': 110,
                        'text-valign': 'bottom', 'text-margin-y': 8, 'color': textColor,
                        'background-color': '#00c7b1', 'width': 18, 'height': 18
                    }},
                    { selector: 'node[type = "Coordinator"]', style: { 'background-color': '#ef4444', 'width': 30, 'height': 30 }},
                    { selector: 'node[type = "Router"]', style: { 'background-color': '#2f9ee5', 'width': 24, 'height': 24 }},
                    { selector: 'node[failed != ""]', style: { 'border-width': 4, 'border-color': '#f59e0b' }},
                    { selector: 'edge', style: {
                        'width': 1, 'line-color': '#8b95a5', 'target-arrow-color': '#8b95a5',
                        'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'opacity': 0.55
                    }},
                    { selector: `edge[lqi < ${threshold}]`, style: { 'line-color': '#ef4444', 'target-arrow-color': '#ef4444', 'width': 2 }},
                    { selector: 'edge[routes > 0]', style: { 'line-color': '#22c55e', 'target-arrow-color': '#22c55e', 'width': 2.5 }}
                ],
                layout: {
                    name: 'concentric',
                    animate: false,
                    fit: true,
                    padding: 40,
                    minNodeSpacing: 24,
                    concentric: node => node.data('type') === 'Coordinator' ? 3 : (node.data('type') === 'Router' ? 2 : 1),
                    levelWidth: () => 1
                }
            });
        } catch (error) {
            showRenderError(`Die Netzwerkkarte konnte nicht dargestellt werden: ${error?.message || error}`);
            return;
        }
        cy.on('tap', 'node', event => {
            const node = event.target.data();
            const details = document.getElementById('details');
            details.innerHTML = `<strong>${escapeHtml(node.label || node.id)}</strong>${escapeHtml(node.type || '')}${node.model ? ` · ${escapeHtml(node.model)}` : ''}${node.failed ? `<br>Scanfehler: ${escapeHtml(node.failed)}` : ''}`;
            details.style.display = 'block';
        });
        cy.on('tap', event => {
            if (event.target === cy) document.getElementById('details').style.display = 'none';
        });
        requestAnimationFrame(() => {
            resizeGraph(true);
        });
        applyFilters();
    }

    function showRenderError(message) {
        const empty = document.getElementById('empty');
        empty.textContent = message;
        empty.classList.add('error');
        empty.style.display = 'grid';
    }

    function resizeGraph(fit = false) {
        if (!cy) {
            return;
        }
        cy.resize();
        if (fit) {
            cy.fit(undefined, 40);
        }
    }

    function scheduleGraphResize() {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(() => resizeGraph(true));
    }

    async function toggleFullscreen() {
        try {
            if (document.fullscreenElement) {
                await document.exitFullscreen();
                return;
            }
            await document.documentElement.requestFullscreen();
        } catch (error) {
            showRenderError(`Das Vollbild konnte nicht geöffnet werden: ${error?.message || error}`);
        }
    }

    function requestCurrentState() {
        if (stateRequestPending || typeof requestAction !== 'function') {
            return;
        }
        stateRequestPending = true;
        try {
            requestAction('RefreshVisualization', true);
        } catch {
            // The initial data remains available if the visualization channel is not ready yet.
            stateRequestPending = false;
            setTimeout(requestCurrentState, 250);
        }
    }

    function applyFilters() {
        if (!cy) return;
        const threshold = Number(currentData.threshold || 50);
        cy.edges().style('display', edge => {
            if (weakOnly && Number(edge.data('lqi')) >= threshold) return 'none';
            if (routesOnly && Number(edge.data('routes')) === 0) return 'none';
            return 'element';
        });
        cy.nodes().style('display', node => node.connectedEdges(':visible').length || (!weakOnly && !routesOnly) ? 'element' : 'none');
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    }

    document.getElementById('fit').addEventListener('click', () => cy?.fit(undefined, 30));
    document.getElementById('weak').addEventListener('click', event => { weakOnly = !weakOnly; event.target.style.opacity = weakOnly ? '1' : '0.8'; applyFilters(); });
    document.getElementById('routes').addEventListener('click', event => { routesOnly = !routesOnly; event.target.style.opacity = routesOnly ? '1' : '0.8'; applyFilters(); });
    const fullscreenButton = document.getElementById('fullscreen');
    fullscreenButton.hidden = !document.fullscreenEnabled;
    fullscreenButton.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', () => {
        fullscreenButton.textContent = document.fullscreenElement ? 'Vollbild schließen' : 'Vollbild';
        scheduleGraphResize();
    });
    window.addEventListener('resize', scheduleGraphResize);
    window.addEventListener('pageshow', requestCurrentState);
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            scheduleGraphResize();
            requestCurrentState();
        }
    });
    if (typeof ResizeObserver === 'function') {
        new ResizeObserver(scheduleGraphResize).observe(document.body);
    }
    function handleMessage(data) {
        if (Array.isArray(data) && data.length === 1) {
            data = data[0];
        }
        if (typeof data === 'string') {
            try {
                data = JSON.parse(data);
            } catch {
                return;
            }
        }
        if (!data || typeof data !== 'object') {
            return;
        }
        stateRequestPending = false;
        render(data);
    }
    render(initialData);
    setTimeout(requestCurrentState, 50);
</script>
</body>
</html>
