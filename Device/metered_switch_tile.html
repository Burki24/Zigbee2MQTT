<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent: #10c8b2;
            --button-off: #607d8b;
            --bg: #ffffff;
            --text: #111111;
            --muted: #667085;
            --line: rgba(17, 24, 39, 0.12);
            --chip: rgba(0, 0, 0, 0.055);
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button {
            font: inherit;
        }

        .tile {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 240px;
            overflow: hidden;
            background: var(--bg);
        }

        .view {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
            padding: 22px 18px 18px;
        }

        .view.active {
            display: block;
        }

        .power-view {
            background:
                radial-gradient(circle at 50% 46%, rgba(255, 236, 89, 0.82), rgba(255, 236, 89, 0.28) 32%, rgba(255, 255, 255, 0) 58%),
                #ffffff;
        }

        .nav-button {
            position: absolute;
            top: 76px;
            display: grid;
            place-items: center;
            width: 50px;
            height: 50px;
            border: 0;
            border-radius: 50%;
            color: #111111;
            background: transparent;
            cursor: pointer;
            z-index: 3;
        }

        .nav-button:hover,
        .nav-button.active {
            background: var(--chip);
        }

        .nav-button.left {
            left: 42px;
        }

        .nav-button.right {
            right: 42px;
        }

        .nav-icon {
            width: 27px;
            height: 27px;
        }

        .power-wrap {
            position: absolute;
            left: 50%;
            top: 47%;
            display: grid;
            justify-items: center;
            transform: translate(-50%, -50%);
        }

        .power-button {
            display: grid;
            place-items: center;
            width: min(34vw, 34vh, 148px);
            height: min(34vw, 34vh, 148px);
            min-width: 104px;
            min-height: 104px;
            border: 0;
            border-radius: 50%;
            color: #ffffff;
            background: var(--accent);
            cursor: pointer;
            transition: background 160ms ease, transform 160ms ease;
        }

        .power-button.off {
            background: var(--button-off);
        }

        .power-button:active {
            transform: scale(0.97);
        }

        .power-icon {
            width: 54%;
            height: 54%;
        }

        .state-value {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 72%;
            overflow: hidden;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: clamp(34px, 9vmin, 44px);
            font-weight: 400;
            line-height: 1.05;
        }

        .state-label {
            position: absolute;
            left: 18px;
            right: 18px;
            top: calc(72% + 46px);
            overflow: hidden;
            color: var(--muted);
            text-align: center;
            text-overflow: ellipsis;
            text-transform: uppercase;
            white-space: nowrap;
            font-size: 12px;
            line-height: 1;
        }

        .list-view {
            background: #ffffff;
        }

        .list {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 132px;
            bottom: 18px;
            display: grid;
            align-content: start;
            gap: 0;
            overflow: hidden;
        }

        .row {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr) auto;
            align-items: center;
            min-height: 36px;
            gap: 8px;
            border-bottom: 1px solid transparent;
            color: #111111;
        }

        .row-icon {
            display: grid;
            place-items: center;
            color: #111111;
        }

        .row-icon svg {
            width: 23px;
            height: 23px;
        }

        .row-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .row-value {
            overflow: hidden;
            max-width: 45vw;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        @media (max-width: 340px), (max-height: 300px) {
            .nav-button {
                top: 58px;
                width: 44px;
                height: 44px;
            }

            .nav-button.left {
                left: 24px;
            }

            .nav-button.right {
                right: 24px;
            }

            .state-value {
                font-size: 30px;
            }

            .list {
                top: 112px;
            }

            .row {
                min-height: 34px;
            }
        }
    </style>
</head>
<body>
    <main class="tile">
        <section class="view power-view active" id="powerView">
            <button class="nav-button left" id="showListLeft" type="button" title="Messwerte">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m13 2-7 12h6l-1 8 7-12h-6l1-8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                </svg>
            </button>
            <button class="nav-button right" id="showListRight" type="button" title="Messwerte">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 19h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M7 17V9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M12 17V5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M17 17v-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                </svg>
            </button>

            <div class="power-wrap">
                <button class="power-button off" id="powerButton" type="button" aria-label="Toggle">
                    <svg class="power-icon" viewBox="0 0 64 64" aria-hidden="true">
                        <path d="M32 8v24" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"></path>
                        <path d="M21 18a21 21 0 1 0 22 0" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"></path>
                    </svg>
                </button>
            </div>

            <div class="state-value" id="stateValue">-</div>
            <div class="state-label">Status</div>
        </section>

        <section class="view list-view" id="listView">
            <button class="nav-button left active" id="showPowerLeft" type="button" title="Zurueck">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    <path d="M7.4 5.6a8 8 0 1 0 9.2 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </button>
            <button class="nav-button right active" id="showPowerRight" type="button" title="Zurueck">
                <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    <path d="M7.4 5.6a8 8 0 1 0 9.2 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </button>
            <div class="list" id="meterList"></div>
        </section>
    </main>

    <script>
        const labels = {
            power: "Leistung",
            energy: "Energie",
            voltage: "Spannung",
            current: "Strom"
        };
        const order = ["energy", "power", "voltage", "current"];
        const iconPaths = {
            power: '<path d="m13 2-7 12h6l-1 8 7-12h-6l1-8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>',
            energy: '<path d="m13 2-7 12h6l-1 8 7-12h-6l1-8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path><path d="M5 22h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>',
            voltage: '<path d="M5 12h4l2-7 2 14 2-7h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>',
            current: '<path d="M4 14a8 8 0 1 1 16 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M12 14v-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><path d="M8 20h8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>'
        };

        let data = __INITIAL_DATA__;
        let activeView = "power";

        const powerView = document.getElementById("powerView");
        const listView = document.getElementById("listView");
        const powerButton = document.getElementById("powerButton");
        const stateValue = document.getElementById("stateValue");
        const meterList = document.getElementById("meterList");

        function handleMessage(message) {
            const nextData = normalizeMessage(message);
            if (!nextData) {
                return;
            }

            data = nextData;
            render();
        }

        function normalizeMessage(message) {
            if (Array.isArray(message) && message.length === 1) {
                message = message[0];
            }

            if (!message || typeof message !== "object") {
                return null;
            }

            if (message.type !== "meteredSwitch" || !message.values || typeof message.values !== "object") {
                return null;
            }

            return message;
        }

        function setView(view) {
            activeView = view;
            render();
        }

        function render() {
            if (!data.values) {
                data.values = {};
            }

            powerView.classList.toggle("active", activeView === "power");
            listView.classList.toggle("active", activeView === "list");

            const state = data.values.state;
            const isOn = !!(state && state.value);
            powerButton.classList.toggle("off", !isOn);
            stateValue.textContent = state ? state.formatted : "-";

            meterList.replaceChildren();
            let renderedRows = 0;
            const availableKeys = Object.keys(data.values || {});
            for (const ident of order) {
                const item = data.values[ident];
                if (!item) {
                    continue;
                }
                const row = document.createElement("div");
                row.className = "row";
                row.innerHTML = [
                    `<div class="row-icon"><svg viewBox="0 0 24 24" aria-hidden="true">${iconPaths[ident]}</svg></div>`,
                    `<div class="row-label">${labels[ident]}</div>`,
                    `<div class="row-value">${item.formatted}</div>`
                ].join("");
                meterList.appendChild(row);
                renderedRows++;
            }

            if (renderedRows === 0) {
                const row = document.createElement("div");
                row.className = "row";
                row.innerHTML = [
                    '<div class="row-icon"></div>',
                    '<div class="row-label">Keine Messwerte</div>',
                    '<div class="row-value"></div>'
                ].join("");
                meterList.appendChild(row);
            }
        }

        document.getElementById("showListLeft").addEventListener("click", () => setView("list"));
        document.getElementById("showListRight").addEventListener("click", () => setView("list"));
        document.getElementById("showPowerLeft").addEventListener("click", () => setView("power"));
        document.getElementById("showPowerRight").addEventListener("click", () => setView("power"));
        powerButton.addEventListener("click", () => requestAction("MeteredSwitchTile.Toggle", true));

        render();
    </script>
</body>
</html>
